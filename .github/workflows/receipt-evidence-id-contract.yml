name: PFarma Receipt Evidence ID Contract

on:
  pull_request:
    paths:
      - 'source-ref.txt'
      - '.github/workflows/receipt-evidence-id-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    environment: pfarma-ci-trusted
    steps:
      - name: Check out public control repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate requested private source SHA
        id: source
        shell: bash
        run: |
          set -euo pipefail
          sha="$(tr -d '\r\n' < source-ref.txt)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Check out exact private PFarma commit
        uses: actions/checkout@v4
        with:
          repository: giovannifidel-collab/pfarma-cloud
          ref: ${{ steps.source.outputs.sha }}
          token: ${{ secrets.PFARMA_SOURCE_TOKEN }}
          path: private-source
          fetch-depth: 1
          persist-credentials: false
      - name: Verify exact private source
        working-directory: private-source
        shell: bash
        run: test "$(git rev-parse HEAD)" = '${{ steps.source.outputs.sha }}'
      - name: Receipt evidence ID compatibility
        working-directory: private-source
        shell: bash
        run: '[ ! -f tools/test_receipt_projection_evidence_id_contract.py ] || python tools/test_receipt_projection_evidence_id_contract.py'
      - name: Receipt JSON deterministic model
        working-directory: private-source
        shell: bash
        run: |
          [ ! -f tools/test_receipt_projection_json_contract.py ] || python -c "import sys; sys.path.insert(0, 'tools'); import test_receipt_projection_json_contract as t; t.test_projection_builder_is_deterministic_and_non_authorizing()"
      - name: Receipt JSON non-finite rejection
        working-directory: private-source
        shell: bash
        run: |
          [ ! -f tools/test_receipt_projection_json_contract.py ] || python -c "import sys; sys.path.insert(0, 'tools'); import test_receipt_projection_json_contract as t; t.test_projection_builder_rejects_non_finite_quantity()"
      - name: Receipt JSON route equivalence
        working-directory: private-source
        shell: bash
        run: |
          [ ! -f tools/test_receipt_projection_json_contract.py ] || python -c "import sys; sys.path.insert(0, 'tools'); import test_receipt_projection_json_contract as t; t.test_json_representation_matches_human_projection_evidence()"
      - name: Receipt projection chain contract
        working-directory: private-source
        shell: bash
        run: '[ ! -f tools/test_receipt_projection_chain_contract.py ] || python tools/test_receipt_projection_chain_contract.py'
      - name: Remove private source checkout
        if: always()
        shell: bash
        run: rm -rf private-source

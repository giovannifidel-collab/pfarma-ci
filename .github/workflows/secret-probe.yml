name: PFarma CI Secret Probe

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/secret-probe.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: pfarma-ci-trusted
    env:
      PFARMA_CI_BUNDLE_KEY: ${{ secrets.PFARMA_CI_BUNDLE_KEY }}
    steps:
      - name: Check out public CI repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned authenticated-encryption dependency
        run: python -m pip install --disable-pip-version-check 'cryptography==46.0.4'

      - name: Validate configured secret without printing it
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PFARMA_CI_BUNDLE_KEY" || { echo 'PFARMA_CI_BUNDLE_KEY missing' >&2; exit 1; }
          python - <<'PY'
          import base64, os
          raw = os.environ['PFARMA_CI_BUNDLE_KEY']
          key = base64.b64decode(raw, validate=True)
          if len(key) != 32:
              raise SystemExit('PFARMA_CI_BUNDLE_KEY must decode to exactly 32 bytes')
          print('Secret present and structurally valid; value not printed.')
          PY

      - name: Prove secret-backed encrypt/decrypt on dummy source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/dummy-source"
          printf '%s\n' 'PFarma encrypted hosted CI secret probe' > "$RUNNER_TEMP/dummy-source/probe.txt"
          python tools/public_ci_bundle.py pack \
            --source "$RUNNER_TEMP/dummy-source" \
            --output "$RUNNER_TEMP/probe.bundle.json" \
            --source-ref secret-probe
          python tools/public_ci_bundle.py unpack \
            --bundle "$RUNNER_TEMP/probe.bundle.json" \
            --destination "$RUNNER_TEMP/probe-opened"
          test "$(cat "$RUNNER_TEMP/probe-opened/probe.txt")" = 'PFarma encrypted hosted CI secret probe'

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/dummy-source" "$RUNNER_TEMP/probe.bundle.json" "$RUNNER_TEMP/probe-opened"

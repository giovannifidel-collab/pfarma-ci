name: PFarma CI Secret Probe

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/secret-probe.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/secret-probe.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: pfarma-ci-trusted
    env:
      PFARMA_CI_BUNDLE_KEY: ${{ secrets.PFARMA_CI_BUNDLE_KEY }}
    steps:
      - name: Check out public CI repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned authenticated-encryption dependency
        run: python -m pip install --disable-pip-version-check 'cryptography==46.0.4'

      - name: Secret exists
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PFARMA_CI_BUNDLE_KEY"

      - name: Raw secret is strict base64
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, os
          base64.b64decode(os.environ['PFARMA_CI_BUNDLE_KEY'].strip(), validate=True)
          print('Raw strict base64 validation passed; value not printed.')
          PY

      - name: Common wrapper normalization yields strict base64
        id: normalized
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, os
          raw = os.environ['PFARMA_CI_BUNDLE_KEY'].strip()
          if raw.startswith('PFARMA_CI_BUNDLE_KEY='):
              raw = raw.split('=', 1)[1].strip()
          if len(raw) >= 2 and raw[0] == raw[-1] and raw[0] in {'"', "'"}:
              raw = raw[1:-1].strip()
          key = base64.b64decode(raw, validate=True)
          if len(key) != 32:
              raise SystemExit(2)
          print('Common wrapper normalization produced a valid 32-byte AES key; value not printed.')
          PY

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/dummy-source" "$RUNNER_TEMP/probe.bundle.json" "$RUNNER_TEMP/probe-opened"

# Same-repository PR probe only; never exposes the secret value or bytes.

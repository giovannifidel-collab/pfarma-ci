name: PFarma Sales Reconciliation Drilldown Exact Head

on:
  pull_request:
    paths:
      - 'source-ref.txt'
      - '.github/workflows/pfarma-sales-reconciliation-drilldown-exact.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sales-reconciliation-drilldown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pfarma-ci-trusted
    steps:
      - name: Check out public control repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate requested private source SHA
        id: source
        shell: bash
        run: |
          set -euo pipefail
          sha="$(tr -d '\r\n' < source-ref.txt)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Check out exact private PFarma commit
        uses: actions/checkout@v4
        with:
          repository: giovannifidel-collab/pfarma-cloud
          ref: ${{ steps.source.outputs.sha }}
          token: ${{ secrets.PFARMA_SOURCE_TOKEN }}
          path: private-source
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact source
        shell: bash
        run: test "$(git -C private-source rev-parse HEAD)" = '${{ steps.source.outputs.sha }}'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate sales reconciliation boundary
        working-directory: private-source
        run: python -m unittest backend.test_sales_reconciliation

      - name: Validate sales reconciliation drill-down
        working-directory: private-source
        run: python tools/test_sales_reconciliation_drilldown.py

      - name: Remove private source checkout
        if: always()
        run: rm -rf private-source

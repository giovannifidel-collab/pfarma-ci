name: PFarma Encrypted Hosted CI

on:
  push:
    branches: [main]
    paths:
      - 'bundle/pfarma-ci.bundle.json'
      - '.github/workflows/run-encrypted-pfarma.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/run-encrypted-pfarma.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pfarma-encrypted-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  encrypted-pfarma:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        shard: [smoke, health]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pfarma-ci-trusted
    env:
      PFARMA_CI_BUNDLE_KEY: ${{ secrets.PFARMA_CI_BUNDLE_KEY }}
    steps:
      - name: Check out public ciphertext repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned authenticated-encryption dependency
        run: python -m pip install --disable-pip-version-check 'cryptography==46.0.4'

      - name: Fail closed unless trusted secret and encrypted bundle exist
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PFARMA_CI_BUNDLE_KEY" || { echo 'PFARMA_CI_BUNDLE_KEY is not configured.' >&2; exit 1; }
          python - <<'PY'
          import base64, os
          key = base64.b64decode(os.environ['PFARMA_CI_BUNDLE_KEY'].strip(), validate=True)
          if len(key) != 32:
              raise SystemExit('PFARMA_CI_BUNDLE_KEY must decode to exactly 32 bytes')
          print('Trusted AES-256 key is structurally valid; value not printed.')
          PY
          test -f bundle/pfarma-ci.bundle.json || { echo 'Encrypted PFarma bundle is not present.' >&2; exit 1; }

      - name: Decrypt PFarma source into ephemeral runner storage
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/pfarma-source-${{ matrix.shard }}"
          python tools/public_ci_bundle.py unpack \
            --bundle bundle/pfarma-ci.bundle.json \
            --destination "$RUNNER_TEMP/pfarma-source-${{ matrix.shard }}"

      - name: Execute trusted encrypted-source CI shard
        shell: bash
        working-directory: ${{ runner.temp }}/pfarma-source-${{ matrix.shard }}
        run: |
          set -euo pipefail
          test -f tools/public_ci_entrypoint.py || { echo 'Encrypted source does not expose tools/public_ci_entrypoint.py.' >&2; exit 1; }
          python tools/public_ci_entrypoint.py --shard '${{ matrix.shard }}'

      - name: Remove decrypted workspace
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/pfarma-source-${{ matrix.shard }}"

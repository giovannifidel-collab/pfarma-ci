name: PFarma Encrypted Hosted CI

on:
  push:
    branches: [main]
    paths:
      - 'bundle/pfarma-ci.bundle.json'
      - '.github/workflows/run-encrypted-pfarma.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pfarma-encrypted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  encrypted-python:
    strategy:
      fail-fast: false
      matrix:
        shard: [smoke, health, quality, migration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pfarma-ci-trusted
    env:
      PFARMA_CI_BUNDLE_KEY: ${{ secrets.PFARMA_CI_BUNDLE_KEY }}
      PYTHONUTF8: '1'
    steps:
      - name: Check out public ciphertext repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned authenticated-encryption dependency
        run: python -m pip install --disable-pip-version-check 'cryptography==46.0.4'

      - name: Validate secret and encrypted bundle
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PFARMA_CI_BUNDLE_KEY"
          python - <<'PY'
          import base64, os
          key = base64.b64decode(os.environ['PFARMA_CI_BUNDLE_KEY'].strip(), validate=True)
          if len(key) != 32:
              raise SystemExit('PFARMA_CI_BUNDLE_KEY must decode to exactly 32 bytes')
          print('Trusted AES-256 key is structurally valid; value not printed.')
          PY
          test -f bundle/pfarma-ci.bundle.json

      - name: Decrypt PFarma source into ephemeral runner storage
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/pfarma-source-${{ matrix.shard }}"
          python tools/public_ci_bundle.py unpack \
            --bundle bundle/pfarma-ci.bundle.json \
            --destination "$RUNNER_TEMP/pfarma-source-${{ matrix.shard }}"

      - name: Execute encrypted PFarma shard
        shell: bash
        working-directory: ${{ runner.temp }}/pfarma-source-${{ matrix.shard }}
        run: |
          set -euo pipefail
          case '${{ matrix.shard }}' in
            smoke)
              test -f tools/public_ci_entrypoint.py
              python tools/public_ci_entrypoint.py --shard smoke
              ;;
            health)
              test -f tools/public_ci_entrypoint.py
              python tools/public_ci_entrypoint.py --shard health
              ;;
            quality)
              python -m compileall -q .
              if [ -f database/schema/0002_core_v1.sql ]; then test -f tools/test_core_schema_contract.py; python tools/test_core_schema_contract.py; fi
              if [ -f agent/staging/test_normalized_staging.py ]; then python agent/staging/test_normalized_staging.py; elif [ -f tools/test_staging_v2.py ]; then python tools/test_staging_v2.py; else echo 'No staging integrity test found.' >&2; exit 1; fi
              if [ -f agent/staging/import_supplier_catalog.py ]; then test -f agent/staging/test_supplier_catalog_staging_loader.py; python agent/staging/test_supplier_catalog_staging_loader.py; fi
              if [ -f agent/staging/reconcile_supplier_catalog.py ]; then test -f agent/staging/test_supplier_catalog_reconciliation.py; python agent/staging/test_supplier_catalog_reconciliation.py; fi
              if [ -f contracts/supplier-catalog-v1.schema.json ] || [ -f tools/test_supplier_catalog_validator.py ]; then test -f tools/test_supplier_catalog_validator.py; python tools/test_supplier_catalog_validator.py; fi
              if [ -f integrations/suppliers/catalog_staging.py ]; then test -f tools/test_supplier_catalog_staging.py; python tools/test_supplier_catalog_staging.py; fi
              if [ -f integrations/suppliers/catalog_matching.py ]; then test -f tools/test_supplier_catalog_matching.py; python tools/test_supplier_catalog_matching.py; fi
              if [ -f integrations/suppliers/catalog_promotion.py ]; then test -f tools/test_supplier_catalog_promotion.py; python tools/test_supplier_catalog_promotion.py; fi
              if [ -f integrations/suppliers/catalog_promotion_executor.py ]; then test -f tools/test_supplier_catalog_promotion_executor.py; python tools/test_supplier_catalog_promotion_executor.py; fi
              if [ -f integrations/suppliers/catalog_import_orchestrator.py ]; then test -f tools/test_supplier_catalog_import_orchestrator.py; python tools/test_supplier_catalog_import_orchestrator.py; fi
              if [ -f integrations/suppliers/catalog_promotion_postgres.py ]; then test -f tools/test_supplier_catalog_promotion_postgres_store.py; python tools/test_supplier_catalog_promotion_postgres_store.py; fi
              ;;
            migration)
              python agent/staging/test_normalized_staging.py
              python agent/staging/test_normalized_staging_semantic_audit.py
              python agent/staging/test_normalized_staging_domain_audit.py
              python agent/staging/test_normalized_staging_identity_quality_audit.py
              python agent/staging/test_normalized_staging_expiry_quality_audit.py
              python agent/staging/test_normalized_staging_quantity_quality_audit.py
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_controlled_migration_dry_run as t; d=tempfile.TemporaryDirectory(); t.test_valid_staging_reaches_existing_finalizer(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_controlled_migration_dry_run as t; d=tempfile.TemporaryDirectory(); t.test_invalid_expiry_blocks_finalizer_without_mutation(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_controlled_migration_dry_run as t; d=tempfile.TemporaryDirectory(); t.test_invalid_persisted_evidence_is_not_reported_ready(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_controlled_migration_dry_run as t; d=tempfile.TemporaryDirectory(); t.test_missing_database_is_not_created(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_migration_dry_run_finalizer as t; d=tempfile.TemporaryDirectory(); t.test_ready_when_all_blockers_are_clear(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_migration_dry_run_finalizer as t; d=tempfile.TemporaryDirectory(); t.test_empty_run_is_not_ready(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_migration_dry_run_finalizer as t; d=tempfile.TemporaryDirectory(); t.test_product_only_run_is_not_ready_without_inventory(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_migration_dry_run_finalizer as t; d=tempfile.TemporaryDirectory(); t.test_validated_when_unresolved_outliers_or_errors_exist(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_migration_dry_run_finalizer as t; d=tempfile.TemporaryDirectory(); t.test_missing_database_is_never_created(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_migration_dry_run_finalizer as t; d=tempfile.TemporaryDirectory(); t.test_incompatible_schema_fails_before_any_write(Path(d.name)); d.cleanup()"
              python -c "import sys,tempfile; from pathlib import Path; sys.path.insert(0, 'agent/staging'); import test_migration_dry_run_finalizer as t; d=tempfile.TemporaryDirectory(); t.test_failed_run_is_never_resurrected_or_mutated(Path(d.name)); d.cleanup()"
              python agent/staging/test_migration_dry_run_evidence_verifier.py
              python agent/staging/test_migration_dry_run_evidence_text_types.py
              python agent/staging/test_migration_dry_run_product_partition.py
              python agent/staging/test_verify_migration_sample_acceptance_artifact.py
              python agent/staging/test_verify_migration_sample_acceptance_envelope.py
              ;;
          esac

      - name: Remove decrypted workspace
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/pfarma-source-${{ matrix.shard }}"

  encrypted-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: pfarma-ci-trusted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pfarma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d pfarma_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      PFARMA_CI_BUNDLE_KEY: ${{ secrets.PFARMA_CI_BUNDLE_KEY }}
      PGPASSWORD: postgres
    steps:
      - name: Check out public ciphertext repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned authenticated-encryption dependency
        run: python -m pip install --disable-pip-version-check 'cryptography==46.0.4'

      - name: Decrypt PFarma source into ephemeral runner storage
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/pfarma-source-postgres"
          python tools/public_ci_bundle.py unpack --bundle bundle/pfarma-ci.bundle.json --destination "$RUNNER_TEMP/pfarma-source-postgres"

      - name: Execute PostgreSQL schema smoke
        shell: bash
        working-directory: ${{ runner.temp }}/pfarma-source-postgres
        run: |
          set -euo pipefail
          if [ -f database/schema/0002_core_v1.sql ]; then test -f tools/test_core_schema_postgres.sql; psql -h localhost -U postgres -d pfarma_test -f tools/test_core_schema_postgres.sql; fi
          if [ -f database/schema/0004_supplier_catalog_staging.sql ]; then test -f tools/test_supplier_catalog_staging_postgres.sql; psql -h localhost -U postgres -d pfarma_test -f tools/test_supplier_catalog_staging_postgres.sql; fi
          if [ -f database/schema/0005_supplier_catalog_promotion.sql ]; then test -f tools/test_supplier_catalog_promotion_postgres.sql; psql -h localhost -U postgres -d pfarma_test -f tools/test_supplier_catalog_promotion_postgres.sql; fi

      - name: Remove decrypted workspace
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/pfarma-source-postgres"

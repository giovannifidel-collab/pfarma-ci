name: PFarma Document Queue Exact Head

on:
  pull_request:
    paths:
      - 'source-ref.txt'
      - '.github/workflows/pfarma-document-queue-exact.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  document-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pfarma-ci-trusted
    steps:
      - name: Check out public control repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate requested private source SHA
        id: source
        shell: bash
        run: |
          set -euo pipefail
          sha="$(tr -d '\r\n' < source-ref.txt)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Check out exact private PFarma commit
        uses: actions/checkout@v4
        with:
          repository: giovannifidel-collab/pfarma-cloud
          ref: ${{ steps.source.outputs.sha }}
          token: ${{ secrets.PFARMA_SOURCE_TOKEN }}
          path: private-source
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact source
        shell: bash
        run: test "$(git -C private-source rev-parse HEAD)" = '${{ steps.source.outputs.sha }}'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate document queue provider
        working-directory: private-source
        run: python tools/test_sales_document_read_postgres.py

      - name: Validate document search adapter
        working-directory: private-source
        run: python tools/test_global_search_sales_document_reader.py

      - name: Validate document queue root page
        working-directory: private-source
        run: python -c "from tools.test_runtime_sales_document_review_search import assert_root_queue,assert_select_only; q=assert_root_queue(); assert_select_only(q)"

      - name: Validate exact document review
        working-directory: private-source
        run: python -c "from tools.test_runtime_sales_document_review_search import assert_exact_review,assert_select_only; q=assert_exact_review(); assert_select_only(q)"

      - name: Validate exact document global search
        working-directory: private-source
        run: python -c "from tools.test_runtime_sales_document_review_search import assert_exact_global_search,assert_select_only; q=assert_exact_global_search(); assert_select_only(q)"

      - name: Validate complete document review runtime
        working-directory: private-source
        run: python tools/test_runtime_sales_document_review_search.py

      - name: Validate global runtime search
        working-directory: private-source
        run: python tools/test_runtime_global_search_wiring.py

      - name: Validate management shell navigation
        working-directory: private-source
        run: python tools/test_management_shell_global_search_entry.py

      - name: Remove private source checkout
        if: always()
        run: rm -rf private-source

name: PFarma Party Directories Exact Head

on:
  pull_request:
    paths:
      - 'source-ref.txt'
      - '.github/workflows/pfarma-customer-directory-exact.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  party-directories:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pfarma-ci-trusted
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Resolve exact private source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          sha="$(tr -d '\r\n' < source-ref.txt)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Check out exact private PFarma commit
        uses: actions/checkout@v4
        with:
          repository: giovannifidel-collab/pfarma-cloud
          ref: ${{ steps.source.outputs.sha }}
          token: ${{ secrets.PFARMA_SOURCE_TOKEN }}
          path: private-source
          fetch-depth: 1
          persist-credentials: false
      - name: Verify exact source
        run: test "$(git -C private-source rev-parse HEAD)" = '${{ steps.source.outputs.sha }}'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate customer directory runtime
        working-directory: private-source
        run: python tools/test_runtime_customer_directory.py
      - name: Validate supplier directory runtime
        working-directory: private-source
        run: python tools/test_runtime_supplier_directory.py
      - name: Validate supplier invoice reconciliation runtime
        working-directory: private-source
        run: python tools/test_runtime_supplier_invoice_reconciliation.py
      - name: Validate supplier invoice global search
        working-directory: private-source
        run: python tools/test_supplier_invoice_global_search.py
      - name: Validate sales reconciliation runtime
        working-directory: private-source
        run: python tools/test_runtime_sales_reconciliation.py
      - name: Validate accounting operator handoffs
        working-directory: private-source
        run: python tools/test_accounting_operator_handoffs.py
      - name: Validate global search runtime wiring
        working-directory: private-source
        run: python tools/test_runtime_global_search_wiring.py
      - name: Validate shell navigation
        working-directory: private-source
        run: python tools/test_management_shell_global_search_entry.py
      - name: Compile read-only accounting surfaces
        working-directory: private-source
        run: python -m compileall -q backend/customer_directory_postgres.py backend/supplier_directory_postgres.py backend/supplier_invoice_read_postgres.py backend/supplier_invoice_payment_reconciliation.py backend/sales_reconciliation.py backend/sales_reconciliation_postgres.py web/customer_directory_page.py web/supplier_directory_page.py web/global_search_customer_reader.py web/global_search_supplier_directory_reader.py web/global_search_supplier_invoice_reader.py web/supplier_invoice_reconciliation_page.py web/sales_reconciliation_page.py web/accounting_balance_page.py application_runtime.py
      - name: Remove private source checkout
        if: always()
        run: rm -rf private-source
